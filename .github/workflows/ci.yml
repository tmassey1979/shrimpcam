name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ShrimpCam.Web/package-lock.json

      - name: Install web dependencies
        working-directory: src/ShrimpCam.Web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/ShrimpCam.Web
        run: npx playwright install --with-deps chromium

      - name: Validate version metadata
        shell: pwsh
        run: ./scripts/validate-version-consistency.ps1

      - name: Restore and verify
        shell: pwsh
        run: |
          ./scripts/quality.ps1 -EnforceCoverage
