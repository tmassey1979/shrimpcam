name: build-pi-image

on:
  workflow_run:
    workflows:
      - ci
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      hostname:
        description: Hostname to bake into the image
        required: true
        default: shrimpcam
      image_url:
        description: Raspberry Pi OS Lite image URL
        required: true
        default: https://downloads.raspberrypi.com/raspios_lite_arm64_latest

jobs:
  build-image:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DEFAULT_IMAGE_URL: https://downloads.raspberrypi.com/raspios_lite_arm64_latest
      DEFAULT_HOSTNAME: shrimpcam

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release version
        run: |
          base_version="$(tr -d '[:space:]' < VERSION)"
          source_sha="$(git rev-parse HEAD)"
          short_sha="${source_sha::7}"
          release_version="${base_version}.${GITHUB_RUN_NUMBER}.${short_sha}"
          echo "SOURCE_SHA=${source_sha}" >> "${GITHUB_ENV}"
          echo "RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"
          echo "TAG_NAME=v${release_version}" >> "${GITHUB_ENV}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ShrimpCam.Web/package-lock.json

      - name: Install image tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip xz-utils kpartx dosfstools e2fsprogs rsync

      - name: Validate Raspberry Pi OS image source
        env:
          IMAGE_URL: ${{ inputs.image_url || env.DEFAULT_IMAGE_URL }}
        run: |
          case "${IMAGE_URL}" in
            https://downloads.raspberrypi.com/raspios_lite_arm64_latest|https://downloads.raspberrypi.com/raspios_lite_arm64_latest.*)
              ;;
            *)
              echo "Unsupported Raspberry Pi OS image URL: ${IMAGE_URL}" >&2
              echo "Use the official Raspberry Pi OS Lite arm64 image URL." >&2
              exit 1
              ;;
          esac

      - name: Publish Shrimp Cam for Raspberry Pi
        shell: pwsh
        run: |
          ./scripts/publish-shrimpcam.ps1 `
            -Runtime linux-arm64 `
            -Configuration Release `
            -OutputRoot artifacts/publish/pi `
            -SourceRevision $env:SOURCE_SHA

      - name: Build Raspberry Pi image
        env:
          IMAGE_URL: ${{ inputs.image_url || env.DEFAULT_IMAGE_URL }}
          SHRIMPCAM_HOSTNAME: ${{ inputs.hostname || env.DEFAULT_HOSTNAME }}
          SHRIMPCAM_WIFI_SSID: ${{ secrets.PI_WIFI_SSID }}
          SHRIMPCAM_WIFI_PSK: ${{ secrets.PI_WIFI_PSK }}
          SHRIMPCAM_WIFI_COUNTRY: ${{ secrets.PI_WIFI_COUNTRY }}
        run: |
          chmod +x scripts/pi-image/build-pi-image.sh deploy/raspberry-pi/firstboot-provision.sh
          ./scripts/pi-image/build-pi-image.sh \
            "${IMAGE_URL}" \
            "artifacts/publish/pi/api" \
            "artifacts/publish/pi/web" \
            "artifacts/pi-image"

      - name: Version image artifact
        run: |
          image_path="$(find artifacts/pi-image -maxdepth 1 -name '*.img.xz' | head -n 1)"
          versioned_image="artifacts/pi-image/shrimpcam-pi-${RELEASE_VERSION}.img.xz"
          mv "${image_path}" "${versioned_image}"
          sha256sum "${versioned_image}" > "artifacts/pi-image/shrimpcam-pi-${RELEASE_VERSION}.sha256"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shrimpcam-pi-${{ env.RELEASE_VERSION }}
          path: artifacts/pi-image/*

      - name: Create alpha release
        if: github.event_name == 'workflow_run'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Shrimp Cam ${{ env.RELEASE_VERSION }}
          prerelease: true
          body: |
            Alpha release generated from `${{ env.SOURCE_SHA }}` on `main` after the `ci` workflow completed successfully.

            This release includes a Raspberry Pi OS Lite image with Shrimp Cam installed as headless startup services. Configure Wi-Fi before first boot by editing `shrimpcam-device.env` on the boot partition, or provide `PI_WIFI_SSID`, `PI_WIFI_PSK`, and `PI_WIFI_COUNTRY` repository secrets for workflow-built images.
          files: |
            artifacts/pi-image/shrimpcam-pi-${{ env.RELEASE_VERSION }}.img.xz
            artifacts/pi-image/shrimpcam-pi-${{ env.RELEASE_VERSION }}.sha256
            artifacts/pi-image/README.md
